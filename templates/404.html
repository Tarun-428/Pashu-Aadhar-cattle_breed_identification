{% extends "base.html" %}

                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-warning fa-5x mb-3"></i>
                        <h1 class="display-4 fw-bold text-danger">404</h1>
