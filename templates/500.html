{% extends "base.html" %}

{% block title %}Server Error - Cattle Breed Identification{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="fas fa-server text-danger fa-5x mb-3"></i>
                        <h1 class="display-4 fw-bold text-danger">500</h1>
                        <h2 class="h4 text-muted mb-4">Server Error</h2>
                        <p class="lead mb-4">
                            Something went wrong on our end. Please try again later.
                        </p>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-block">
                        <a href="{{ url_for('index') }}" class="btn btn-success btn-lg me-2">
                            <i class="fas fa-home me-2"></i>Go Home
                        </a>
                        <button onclick="location.reload()" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-redo me-2"></i>Try Again
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
